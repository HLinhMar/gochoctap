<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kho Học Liệu - Linh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #f8fafc; font-family: 'Segoe UI', sans-serif; }
        .card-shadow { box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="p-6 md:p-12">

    <header class="max-w-6xl mx-auto mb-10 text-center">
        <h1 class="text-4xl font-black text-slate-800 mb-2">DANH MỤC HỌC LIỆU</h1>
        <p class="text-slate-500">Hệ thống học liệu tương tác trực quan dành cho học sinh</p>
    </header>

    <main id="main-grid" class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        </main>

    <script>
        /**
         * ============================================================
         * KHU VỰC CHỈNH SỬA DÀNH CHO BẠN (DỄ DÀNG THÊM MỚI TẠI ĐÂY)
         * ============================================================
         * Cách thêm: Copy 1 dòng, dán xuống dưới và sửa nội dung bên trong dấu ngoặc { }
         * icon: Lấy tên tại fontawesome.com (ví dụ: fa-cube, fa-gamepad, fa-pen)
         */
        const DANH_SACH_HOC_LIEU = [
            // NHÓM 1: MÔ PHỎNG & TRỰC QUAN
            { title: "Nghịch lý Asin và Rùa", url: "AsinVaRua.html", category: "Mô phỏng 3D", icon: "fa-person-running" },
            { title: "Học liệu Conic Section", url: "ConicSection.html", category: "Mô phỏng 3D", icon: "fa-cube" },
            { title: "Mô phỏng thủy triều", url: "TuongTacMucNuoc.html", category: "Mô phỏng 3D", icon: "fa-water" },
            { title: "Tìm giao tuyến (Bài 1)", url: "HLTT_BT_GiaoTuyen.html", category: "Mô phỏng 3D", icon: "fa-shapes" },
            { title: "Tìm giao tuyến (Bài 2)", url: "HLTT_BT2_GiaoTuyen.html", category: "Mô phỏng 3D", icon: "fa-shapes" },

            // NHÓM 2: CÔNG CỤ TOÁN HỌC
            { title: "Xét dấu tam thức bậc hai", url: "HLTT_CCXetDauTTB2.html", category: "Công cụ Toán", icon: "fa-calculator" },
            { title: "Xét dấu giá trị lượng giác", url: "HLTT_XetDauGTLG.html", category: "Công cụ Toán", icon: "fa-wave-square" },
            { title: "Hợp - Giao hai tập hợp", url: "HLTT_TapHop.html", category: "Công cụ Toán", icon: "fa-circle-nodes" },

            // NHÓM 3: TRÒ CHƠI
            { title: "Trò chơi Vectơ", url: "TroChoiVecTo.html", category: "Trò chơi học tập", icon: "fa-arrow-up-right-dots" },
            { title: "Hiệu hai xúc xắc", url: "Game_ Hiệu Hai Xúc Xắc.html", category: "Trò chơi học tập", icon: "fa-dice" },
            { title: "Đường đi Euler", url: "HLTT_DDEuler.html", category: "Trò chơi học tập", icon: "fa-route" },
            { title: "Đường đi Euler (bản mới)", url: "HLTT_DDEuler_v2.html", category: "Trò chơi học tập", icon: "fa-route" },

            // NHÓM 4: BÀI TẬP & TRẮC NGHIỆM
            { title: "Bài tập luyện tập", url: "bai-tap.html", category: "Kiểm tra & Đánh giá", icon: "fa-pen-to-square" },
            { title: "Trắc nghiệm Đạo hàm", url: "BT_TrNg_DaoHam.html", category: "Kiểm tra & Đánh giá", icon: "fa-check-double" },
            { title: "Trắc nghiệm Dấu GTLG", url: "BT_TrNg_DauGTLG.html", category: "Kiểm tra & Đánh giá", icon: "fa-check-double" },

            // NHÓM 5: BÀI GIẢNG
            { title: "Bài Giảng Số đặc trưng trung tâm", url: "BaiGiangSoDacTrungTrungTam.html", category: "Bài giảng", icon: "fa-chart-simple" },
            { title: "Bài Giảng Số đặc trưng phân tán", url: "BaiGiangSoDacTrungPhanTan.html", category: "Bài giảng", icon: "fa-chart-pie" },
            { title: "Bài Giảng Elip", url: "BaiGiangElip.html", category: "Bài giảng", icon: "fa-circle-nodes" },
            { title: "Bài Giảng Hypebol", url: "BaiGiangHypebol.html", category: "Bài giảng", icon: "fa-circle-nodes" },
            { title: "Bài Giảng Parabol", url: "BaiGiangParabol.html", category: "Bài giảng", icon: "fa-circle-nodes" },
            { title: "Bài Giảng Dấu của tam thức bậc hai", url: "BaiGiangDauTTB2.html", category: "Bài giảng", icon: "fa-circle-nodes" },
            { title: "Bài Giảng Phương trình quy về phương trình bậc hai", url: "BaiGiang_PTQVPTB2.html", category: "Bài giảng", icon: "fa-circle-nodes" },
            { title: "Bài Giảng Quy tắc đếm", url: "BaiGiangQuytacdem.html", category: "Bài giảng", icon: "fa-circle-nodes" },
            { title: "Bài Giảng Hoán vị - Chỉnh hợp - Tổ hợp", url: "BaiGiangHoanChinhTo.html", category: "Bài giảng", icon: "fa-circle-nodes" },
            { title: "Bài Giảng Nhị thức Newton", url: "BaiGiangNhiThucNewton.html", category: "Bài giảng", icon: "fa-circle-nodes" },
            { title: "Bài Giảng Tọa độ của Vectơ", url: "BaiGiangToadovecto.html", category: "Bài giảng", icon: "fa-circle-nodes" },
            { title: "Bài Giảng Không gian mẫu và Biến cố", url: "BaiGiang_KGM_Bienco.html", category: "Bài giảng", icon: "fa-circle-nodes" },
            { title: "Bài Giảng Xác suất của biến cố", url: "BaiGiang_XSBienCo.html", category: "Bài giảng", icon: "fa-circle-nodes" },
            { title: "Bài Giảng Hàm số lượng giác", url: "BaiGiangHSLG.html", category: "Bài giảng", icon: "fa-circle-nodes" },
            { title: "Bài Giảng Phương trình lượng giác", url: "BaiGiangPTLG.html", category: "Bài giảng", icon: "fa-circle-nodes" },
        ];

        /**
         * ============================================================
         * KHU VỰC XỬ LÝ TỰ ĐỘNG (KHÔNG CẦN CHỈNH SỬA)
         * ============================================================
         */
        const mainGrid = document.getElementById('main-grid');

        // 1. Nhóm các học liệu theo category
        const groups = DANH_SACH_HOC_LIEU.reduce((acc, item) => {
            if (!acc[item.category]) acc[item.category] = [];
            acc[item.category].push(item);
            return acc;
        }, {});

        // 2. Vẽ giao diện
        Object.keys(groups).forEach(catName => {
            const groupData = groups[catName];
            
            // Tạo thẻ Card cho danh mục
            const card = document.createElement('div');
            card.className = "bg-white rounded-2xl p-6 card-shadow border border-slate-100 flex flex-col";
            
            // Tiêu đề danh mục
            card.innerHTML = `
                <h2 class="text-lg font-bold text-slate-800 mb-4 pb-2 border-b border-slate-50 flex items-center">
                    <span class="w-2 h-6 bg-sky-500 rounded-full mr-2"></span>
                    ${catName}
                </h2>
                <ul class="space-y-2 flex-1">
                    ${groupData.map(item => `
                        <li>
                            <a href="${item.url}" class="group flex items-center p-2 rounded-lg hover:bg-sky-50 transition-all">
                                <i class="fa-solid ${item.icon} w-8 text-slate-400 group-hover:text-sky-500 transition-colors"></i>
                                <span class="text-slate-600 group-hover:text-sky-700 font-medium">${item.title}</span>
                            </a>
                        </li>
                    `).join('')}
                </ul>
            `;
            
            mainGrid.appendChild(card);
        });
    </script>

    <footer class="max-w-6xl mx-auto text-center py-10 text-slate-400 text-sm">
        <p>© 2026 - Kho học liệu của Linh | Đã tối ưu hóa cho giảng dạy</p>
    </footer>

</body>
</html>
