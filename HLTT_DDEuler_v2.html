<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Khám phá Đường đi Euler</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-panel: #1e293b;
            --primary: #10b981;
            --primary-glow: rgba(16, 185, 129, 0.4);
            --accent: #6366f1;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --node-unvisited: #475569;
            --node-visited: #6366f1;
            --node-active: #f43f5e;
            --edge-unvisited: #334155;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            overscroll-behavior: none; /* Chống cuộn lố trên iOS */
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        #canvas-container {
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1 / 1;
            position: relative;
            margin: 0 auto;
            border-radius: 20px;
            background: #0b1120;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
            touch-action: none; /* Vô hiệu hóa hành vi touch mặc định (cuộn/zoom) trên canvas */
        }

        canvas {
            width: 100%;
            height: 100%;
            border-radius: 20px;
            display: block;
        }

        .shake {
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .btn {
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }
        
        .btn:active {
            transform: scale(0.96);
        }

        /* Toast thông báo tinh tế */
        #notification {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: var(--bg-panel);
            color: var(--text-main);
            padding: 10px 24px;
            border-radius: 99px;
            font-size: 0.875rem;
            font-weight: 600;
            pointer-events: none;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 50;
        }

        #notification.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        
        /* Modal hoàn thành */
        #overlay {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px); display: none; place-items: center; z-index: 100;
            opacity: 0; transition: opacity 0.4s ease;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="glass-panel w-full max-w-5xl flex flex-col lg:flex-row gap-8 p-6 md:p-10">
        
        <div class="w-full lg:w-5/12 flex flex-col justify-center">
            <div class="mb-2 inline-flex items-center gap-2 px-3 py-1 rounded-full bg-indigo-500/10 border border-indigo-500/20 w-fit">
                <span class="w-2 h-2 rounded-full bg-indigo-400 animate-pulse"></span>
                <span class="text-xs font-semibold text-indigo-300 uppercase tracking-wider" id="level-badge">Cấp độ 1/5</span>
            </div>
            
            <h1 class="text-3xl md:text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400 mb-6">
                Đường Đi Euler
            </h1>
            
            <div class="space-y-4 text-slate-300 text-sm md:text-base leading-relaxed mb-8">
                <p>Mô hình hóa bài toán đồ thị bằng cách vẽ lại các hình khối phức tạp.</p>
                <ul class="space-y-3">
                    <li class="flex items-start gap-3">
                        <span class="text-emerald-400 mt-0.5">●</span>
                        <span>Vuốt hoặc kéo thả để nối các điểm.</span>
                    </li>
                    <li class="flex items-start gap-3">
                        <span class="text-rose-400 mt-0.5">●</span>
                        <span>Quy tắc cốt lõi: <strong>Không nhấc bút</strong> và đi qua mỗi đoạn thẳng <strong>duy nhất 1 lần</strong>.</span>
                    </li>
                </ul>
            </div>

            <div class="flex flex-col gap-3 mt-auto">
                <button id="next-btn" class="btn hidden w-full bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-400 hover:to-teal-400 text-white py-4 rounded-xl font-bold text-lg shadow-[0_0_20px_rgba(16,185,129,0.3)]">
                    Thử thách tiếp theo ➔
                </button>
                
                <div class="flex gap-3">
                    <button onclick="resetCurrentLevel()" class="btn flex-1 bg-slate-800 hover:bg-slate-700 py-3 rounded-xl font-semibold text-sm border border-slate-700 flex items-center justify-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                        Làm lại
                    </button>
                </div>
            </div>
        </div>

        <div class="w-full lg:w-7/12 flex items-center justify-center">
            <div id="canvas-container">
                <canvas id="gameCanvas"></canvas>
                <div id="notification"></div>
            </div>
        </div>

    </div>

    <div id="overlay">
        <div class="glass-panel p-10 text-center max-w-sm w-full mx-4 transform scale-95 transition-transform duration-400" id="modal-content">
            <div class="text-6xl mb-6">🎓</div>
            <h2 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 to-amber-500 mb-4">Xuất sắc!</h2>
            <p class="text-slate-300 mb-8 leading-relaxed">Bạn đã hoàn thành xuất sắc toàn bộ 5 mô hình đồ thị Euler.</p>
            <button onclick="restartGame()" class="btn w-full bg-white text-slate-900 hover:bg-slate-200 py-3 rounded-xl font-bold text-base">
                Trải nghiệm lại từ đầu
            </button>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('canvas-container');
    const notification = document.getElementById('notification');
    const nextBtn = document.getElementById('next-btn');
    const levelBadge = document.getElementById('level-badge');
    const overlay = document.getElementById('overlay');
    const modalContent = document.getElementById('modal-content');

    // Mạng lưới tọa độ tương đối (0.0 -> 1.0)
    const levels = [
        { nodes: [{x:0.2,y:0.8}, {x:0.8,y:0.8}, {x:0.8,y:0.4}, {x:0.2,y:0.4}, {x:0.5,y:0.1}], edges: [[0,1], [1,2], [2,3], [3,0], [2,4], [3,4]] },
        { nodes: [{x:0.2,y:0.2}, {x:0.2,y:0.8}, {x:0.5,y:0.5}, {x:0.8,y:0.2}, {x:0.8,y:0.8}], edges: [[0,1], [1,2], [2,0], [2,3], [3,4], [4,2]] },
        { nodes: [{x:0.2,y:0.8}, {x:0.8,y:0.8}, {x:0.8,y:0.4}, {x:0.2,y:0.4}, {x:0.5,y:0.1}], edges: [[0,1], [1,2], [2,3], [3,0], [0,2], [1,3], [2,4], [3,4]] },
        { nodes: [{x:0.2,y:0.5}, {x:0.35,y:0.2}, {x:0.35,y:0.8}, {x:0.5,y:0.5}, {x:0.65,y:0.2}, {x:0.65,y:0.8}, {x:0.8,y:0.5}], edges: [[0,1], [1,3], [3,2], [2,0], [3,4], [4,6], [6,5], [5,3]] },
        { nodes: [{x:0.5,y:0.1}, {x:0.88,y:0.38}, {x:0.73,y:0.82}, {x:0.27,y:0.82}, {x:0.12,y:0.38}], edges: [[0,1], [1,2], [2,3], [3,4], [4,0], [0,2], [2,4], [4,1], [1,3], [3,0]] }
    ];

    let currentLevel = 0;
    let actualNodes = [];
    let edgesState = [];
    let path = [];
    let isDrawing = false;
    let currentPointerPos = null;
    let isLevelComplete = false;
    let canvasSize = 0;

    // Thiết lập kích thước Canvas động để chuẩn Retina/HD
    function resizeCanvas() {
        const rect = container.getBoundingClientRect();
        canvasSize = rect.width;
        // Đảm bảo độ sắc nét trên màn hình phân giải cao (Retina)
        const dpr = window.devicePixelRatio || 1;
        canvas.width = canvasSize * dpr;
        canvas.height = canvasSize * dpr;
        ctx.scale(dpr, dpr);
        
        mapNodes();
        drawScene();
    }

    function mapNodes() {
        const lvl = levels[currentLevel];
        actualNodes = lvl.nodes.map(n => ({ x: n.x * canvasSize, y: n.y * canvasSize }));
        if(edgesState.length === 0) {
            edgesState = lvl.edges.map(e => ({ u: e[0], v: e[1], visited: false }));
        }
    }

    function initLevel(index) {
        currentLevel = index;
        levelBadge.innerText = `Cấp độ ${index + 1}/${levels.length}`;
        nextBtn.classList.add('hidden');
        isLevelComplete = false;
        edgesState = [];
        resizeCanvas();
        resetCurrentLevel();
    }

    function resetCurrentLevel() {
        path = [];
        isDrawing = false;
        currentPointerPos = null;
        edgesState.forEach(e => e.visited = false);
        container.classList.remove('shake');
        drawScene();
    }

    function showNotify(msg, isError = false) {
        notification.innerText = msg;
        notification.style.color = isError ? '#f43f5e' : '#10b981';
        notification.style.borderColor = isError ? 'rgba(244, 63, 94, 0.3)' : 'rgba(16, 185, 129, 0.3)';
        notification.classList.add('show');
        
        if (isError) {
            container.classList.remove('shake');
            void container.offsetWidth; // Trigger reflow
            container.classList.add('shake');
        }

        setTimeout(() => notification.classList.remove('show'), 2000);
    }

    // --- HỆ THỐNG RENDER ĐỒ HỌA CHẤT LƯỢNG CAO ---
    function drawScene() {
        ctx.clearRect(0, 0, canvasSize, canvasSize);

        // 1. Vẽ các cạnh nền (chưa đi qua)
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.lineWidth = canvasSize * 0.015; // Độ dày tự thích ứng
        edgesState.forEach(e => {
            if (!e.visited) {
                ctx.strokeStyle = '#334155';
                ctx.beginPath();
                ctx.moveTo(actualNodes[e.u].x, actualNodes[e.u].y);
                ctx.lineTo(actualNodes[e.v].x, actualNodes[e.v].y);
                ctx.stroke();
            }
        });

        // 2. Vẽ cạnh tương tác (đang kéo)
        if (isDrawing && currentPointerPos && !isLevelComplete && path.length > 0) {
            const lastNode = actualNodes[path[path.length - 1]];
            ctx.lineWidth = canvasSize * 0.018;
            ctx.strokeStyle = 'rgba(99, 102, 241, 0.5)';
            ctx.beginPath();
            ctx.moveTo(lastNode.x, lastNode.y);
            ctx.lineTo(currentPointerPos.x, currentPointerPos.y);
            ctx.stroke();
        }

        // 3. Vẽ đường đã đi qua thành công
        if (path.length > 1) {
            ctx.lineWidth = canvasSize * 0.02;
            ctx.strokeStyle = '#6366f1';
            ctx.shadowColor = '#6366f1';
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.moveTo(actualNodes[path[0]].x, actualNodes[path[0]].y);
            for (let i = 1; i < path.length; i++) {
                ctx.lineTo(actualNodes[path[i]].x, actualNodes[path[i]].y);
            }
            ctx.stroke();
            ctx.shadowBlur = 0; // Reset shadow
        }

        // 4. Vẽ các đỉnh
        const nodeRadius = canvasSize * 0.035;
        actualNodes.forEach((node, i) => {
            const isCurrent = path.length > 0 && path[path.length - 1] === i;
            const isStart = path.length > 0 && path[0] === i;
            const isVisited = path.includes(i);

            ctx.beginPath();
            ctx.arc(node.x, node.y, nodeRadius, 0, Math.PI * 2);

            if (isCurrent) {
                ctx.fillStyle = '#f43f5e';
                ctx.shadowColor = '#f43f5e'; ctx.shadowBlur = 20;
            } else if (isStart) {
                ctx.fillStyle = '#10b981';
                ctx.shadowColor = '#10b981'; ctx.shadowBlur = 15;
            } else if (isVisited) {
                ctx.fillStyle = '#818cf8';
                ctx.shadowBlur = 0;
            } else {
                ctx.fillStyle = '#475569';
                ctx.shadowBlur = 0;
            }
            
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // Viền trắng nhẹ cho node
            ctx.lineWidth = 2;
            ctx.strokeStyle = 'rgba(255,255,255,0.2)';
            ctx.stroke();
        });
    }

    // --- HỆ THỐNG XỬ LÝ TƯƠNG TÁC (POINTER EVENTS) ---
    function getPointerCoord(e) {
        const rect = canvas.getBoundingClientRect();
        return {
            x: e.clientX - rect.left,
            y: e.clientY - rect.top
        };
    }

    function findHitNode(x, y) {
        const hitRadius = canvasSize * 0.08; // Vùng bắt điểm linh hoạt theo màn hình
        for (let i = 0; i < actualNodes.length; i++) {
            const dx = actualNodes[i].x - x;
            const dy = actualNodes[i].y - y;
            if (Math.sqrt(dx*dx + dy*dy) < hitRadius) return i;
        }
        return -1;
    }

    function getEdgeRecord(u, v) {
        return edgesState.find(e => (e.u === u && e.v === v) || (e.u === v && e.v === u));
    }

    function handlePointerDown(e) {
        if (isLevelComplete) return;
        canvas.setPointerCapture(e.pointerId);
        
        const pos = getPointerCoord(e);
        const hit = findHitNode(pos.x, pos.y);

        if (hit !== -1) {
            isDrawing = true;
            path = [hit];
            currentPointerPos = pos;
            drawScene();
        }
    }

    function handlePointerMove(e) {
        if (!isDrawing || isLevelComplete) return;
        currentPointerPos = getPointerCoord(e);

        const hit = findHitNode(currentPointerPos.x, currentPointerPos.y);
        const currentNode = path[path.length - 1];

        // Nếu vuốt trúng một đỉnh mới
        if (hit !== -1 && hit !== currentNode) {
            const edge = getEdgeRecord(currentNode, hit);
            // Kiểm tra xem đoạn nối này có tồn tại và chưa đi qua không
            if (edge && !edge.visited) {
                edge.visited = true;
                path.push(hit);
                
                // Kiểm tra win condition
                if (edgesState.every(e => e.visited)) {
                    isLevelComplete = true;
                    isDrawing = false;
                    drawScene();
                    
                    if (currentLevel < levels.length - 1) {
                        showNotify("Hoàn hảo! Đường đi đã được nối kín.");
                        nextBtn.classList.remove('hidden');
                    } else {
                        setTimeout(() => {
                            overlay.style.display = 'grid';
                            // Trigger animation
                            setTimeout(() => {
                                overlay.style.opacity = '1';
                                modalContent.classList.remove('scale-95');
                            }, 50);
                        }, 500);
                    }
                }
            }
        }
        if (!isLevelComplete) drawScene();
    }

    function handlePointerUp(e) {
        canvas.releasePointerCapture(e.pointerId);
        if (!isDrawing || isLevelComplete) return;
        isDrawing = false;
        
        // Nếu nhấc bút mà chưa hoàn thành => Sai luật, reset
        if (!edgesState.every(e => e.visited)) {
            showNotify("Luật: Không được nhấc bút giữa chừng!", true);
            setTimeout(resetCurrentLevel, 600);
        }
    }

    // Đăng ký Pointer Events (thay thế hoàn toàn cho Mouse/Touch events)
    canvas.addEventListener('pointerdown', handlePointerDown);
    canvas.addEventListener('pointermove', handlePointerMove);
    canvas.addEventListener('pointerup', handlePointerUp);
    canvas.addEventListener('pointercancel', handlePointerUp);

    // Xử lý nút điều hướng
    nextBtn.addEventListener('click', () => {
        if (currentLevel < levels.length - 1) initLevel(currentLevel + 1);
    });

    window.addEventListener('resize', resizeCanvas);

    function restartGame() {
        overlay.style.opacity = '0';
        modalContent.classList.add('scale-95');
        setTimeout(() => {
            overlay.style.display = 'none';
            initLevel(0);
        }, 400);
    }

    // Khởi tạo
    initLevel(0);

</script>
</body>
</html>
